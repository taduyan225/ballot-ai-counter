<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Ballot Counter</title>
<link rel="stylesheet" href="style.css">

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>

<body>

<h1>AI Ballot Counter</h1>

<video id="video" autoplay></video>
<br>

<button onclick="captureBallot()">Scan Ballot</button>

<ul id="results">

<li>Trần Văn B: <span id="B">0</span></li>
<li>Đinh Thị C: <span id="C">0</span></li>
<li>Võ Thị D: <span id="D">0</span></li>
<li>Võ Văn E: <span id="E">0</span></li>
</ul>

<script src="script.js"></script>

</body>
</html>
